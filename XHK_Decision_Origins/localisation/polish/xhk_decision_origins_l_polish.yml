  ### Edicts
  #-------------------------------------------------------------------------------------------------------
  edict_decision_origins_prosperous_unification:99 "Decision Origins: Prosperous Unification"
  edict_decision_origins_prosperous_unification_desc:99 "Applies some of the effects of the Prosperous Unification origin."
  edict_decision_origins_prosperous_unification_tt:99 "Adds the $prosp_uni_mod$ modifier for 20 years.\nIncreases maximum number of districts on the capital by 2."
  
  decision_origins_cache_warning:99 "§RNOTE: WHEN TAKING A DECISION ORIGIN THAT MODIFIES YOUR POPS, WAIT 1 DAY BEFORE TAKING ANOTHER ONE!\nTHIS ORIGIN IS LOCKED UNTIL 1 DAY HAS PASSED, TO ALLOW FOR GAMESETUP TO COMPLETE§!\n\n"
  decision_origins_modify_warning:99 "§HNOTE: WHEN TAKING A DECISION ORIGIN THAT MODIFIES YOUR POPS, OTHER POPS OF THE SAME SPECIES IN OTHER EMPIRES WILL ALSO BE MODIFIED (NOT DEFAULT ROBOTS). FOR EXAMPLE, PRE-FTLS WITH THE BROKEN SHACKLES ORIGIN§!\n\n"
  
  edict_decision_origins_life_seeded:99 "Decision Origins: Life-Seeded"
  edict_decision_origins_life_seeded_desc:99 "Applies some of the effects of the Life-Seeded origin.\n$decision_origins_cache_warning$$decision_origins_modify_warning$"
  edict_decision_origins_life_seeded_tt:99 "Modifies all non-robotic Pops to have §GGaia Preference§!."
  
  edict_decision_origins_post_apocalyptic:99 "Decision Origins: Post-Apocalyptic"
  edict_decision_origins_post_apocalyptic_desc:99 "Applies some of the effects of the Post-Apocalyptic origin.\n$decision_origins_cache_warning$$decision_origins_modify_warning$"
  edict_decision_origins_post_apocalyptic_tt:99 "Modifies all pops to have §GSurvivor§! or §GRadiation Shielding§!."
  
  edict_decision_origins_ocean_paradise:99 "Decision Origins: Ocean Paradise"
  edict_decision_origins_ocean_paradise_desc:99 "Applies some of the effects of the Ocean Paradise origin.\n$decision_origins_cache_warning$$decision_origins_modify_warning$"
  edict_decision_origins_ocean_paradise_tt:99 "Modifies all pops to have §GAquatic§! or §GWaterproof§!."
  
  edict_decision_origins_subterranean:99 "Decision Origins: Subterranean"
  edict_decision_origins_subterranean_desc:99 "Applies some of the effects of the Subterranean origin.\nThe mining districts will convert after the first monthly tick.\n$decision_origins_cache_warning$$decision_origins_modify_warning$"
  edict_decision_origins_subterranean_tt:99 "Modifies all pops to have §GCave Dweller§! or §GMolebots§!.\nAllows for §Gunrestricted Mining District capacity§!."
  
  edict_decision_origins_overtuned:99 "Decision Origins: Overtuned"
  edict_decision_origins_overtuned_desc:99 "Applies some of the effects of the Overtuned origin."
  edict_decision_origins_overtuned_tt:99 "Allows for §Gaddition of Overtuned§! traits"
  
  edict_decision_origins_resource_consolidation:99 "Decision Origins: Resource Consolidation"
  edict_decision_origins_resource_consolidation_desc:99 "Applies some of the effects of the Resource Consolidation origin."
  edict_decision_origins_resource_consolidation_tt:99 "If an Assimilator, converts the cyborgs to Machine Preference."
  
  edict_decision_origins_toxic_knights:99 "Decision Origins: Knights of the Toxic God"
  edict_decision_origins_toxic_knights_desc:99 "Applies some of the effects of the Knights of the Toxic God origin."
  edict_decision_origins_toxic_knights_tt:99 "Creates a habitat in orbit around the capital and creates the Order's Hall.\n\n§RBE CAREFUL WHEN USING THIS WHEN YOUR CAPITAL IS NOT A NORMAL PLANET (AKA HABITAT OR SOME OTHER HABITABLE STRUCTURE).§!"
  
  edict_decision_origins_galactic_doorstep:99 "Decision Origins: Galactic Doorstep"
  edict_decision_origins_galactic_doorstep_desc:99 "Applies some of the effects of the Galactic Doorstep origin."
  edict_decision_origins_galactic_doorstep_tt:99 "Spawns the §HBlack Crown gateway§! in the capital system.\nStarts the Galactic Doorstep chain.\n\n§RDOES NOT GIVE EXTRA CHANCE TO GET SHARPBEAK PARAGON.§!"
  
  edict_decision_origins_mechanist:99 "Decision Origins: Mechanist"
  edict_decision_origins_mechanist_desc:99 "Applies some of the effect of the Mechanist origin.\n§RDOES NOT CREATE POPS§!."
  edict_decision_origins_mechanist_tt:99 "Spawns a Robot Assembly Plant if not Machine.\nGives §G+2 trait points / +1 trait pick§! for robots/machines."
  
  edict_decision_origins_syncretic_evolution:99 "Decision Origins: Syncretic Evolution"
  edict_decision_origins_syncretic_evolution_desc:99 "Applies some of the effect of the Syncretic Evolution origin.\n$decision_origins_cache_warning$$decision_origins_modify_warning$"
  edict_decision_origins_syncretic_evolution_tt:99 "Spawns 1200 pops of a random portrait with the Proles trait."
  
  edict_decision_origins_tree_of_life:99 "Decision Origins: Tree of Life"
  edict_decision_origins_tree_of_life_desc:99 "Applies some of the effect of the Tree of Life origin."
  
  edict_decision_origins_spawn_shattered_ring:99 "Decision Origins: Shattered Ring"
  edict_decision_origins_spawn_shattered_ring_desc:99 "Spawns a Shattered Ring system next to the capital."
  
  edict_decision_origins_remnants:99 "Decision Origins: Remnants"
  edict_decision_origins_remnants_desc:99 "Applies some of the effect of the Remnants origin."
  
  edict_decision_origins_riftworld:99 "Decision Origins: Riftworld"
  edict_decision_origins_riftworld_desc:99 "Applies some of the effect of the Riftworld origin."
  
  edict_decision_origins_synthetic_fertility:99 "Decision Origins: Synthetic Fertility"
  edict_decision_origins_synthetic_fertility_desc:99 "Gives the situation, buildings, and pop traits of the Synthetic Fertility situation.\n$decision_origins_cache_warning$$decision_origins_modify_warning$"
  edict_decision_origins_synthetic_fertility_tt:99 "Gives all species the Pathogenic Genes trait. Be careful with other things that give you extra starting pops.\n§RMAKE SURE YOU HAVE 2 FREE BUILDINGS SLOTS IN THE GOVERNMENT ZONE OF YOUR CAPITAL§!\n§RDOES NOT GIVE EXTRA DRAW CHANCE FOR THE SYNTH RELATED TECHS§!"
  
  edict_decision_origins_shroudwalker_apprentice:99 "Decision Origins: Shroudwalker Apprentice"
  edict_decision_origins_shroudwalker_apprentice_desc:99 "Gives contact with the Shroudwalker enclave and the Latent Psionic trait.\n$decision_origins_cache_warning$$decision_origins_modify_warning$"
  edict_decision_origins_shroudwalker_apprentice_tt:99 "Does not give some of the flavor events, nor the shroud tunnel starbase building"
  
  edict_decision_origins_starlit_citadel:99 "Decision Origins: Starlit Citadel"
  edict_decision_origins_starlit_citadel_desc:99 "Creates the Deep Space Citadel and the hatchery system and associated attacks."
  edict_decision_origins_starlit_citadel_tt:99 "Creates the hatchery system if it does not already exist."
  
  edict_decision_origins_clone_army:99 "Decision Origins: Clone Army"
  edict_decision_origins_clone_army_desc:99 "Gives the associated techs, building, traits, and event chain."
  edict_decision_origins_clone_army_tt:99 "§YOnly the founder species is given the clone trait.§!\n§RYou will NEED to activate Biogenesis via an EDICT when you have an open ascension perk slot to get it early.§!\n$decision_origins_cache_warning$$decision_origins_modify_warning$"
  edict_xhk_decision_origins_clone_army_biomorphosis:99 "§GCLONE ARMY: CLICK ME FOR THE EARLY BIO ASCENSION§!"
  edict_xhk_decision_origins_clone_army_biomorphosis_desc:99 "In order to avoid mod incompatbilities, you need to CLICK THIS to get the Biomorphosis AP early (as in before the 3 AP limit).\n§YDue to some annoying bugs on PDX's end, I cannot check if you have an open AP slot. So I just have to pray that you behave yourself and NOT take this early when you don't have an available AP slot.§!\n\n§RYou will be a good kid and not cheat right?§!\n\nIf you click this early, you just won't get an open AP slot when you finish your next AP, Biomorphosis will just eat that slot. So its not a real problem."
  xhk_decision_origins_clone_army_biomorphosis_tt:99 "Gives the §GBiomorphosis§! AP and starts the associated situation."
  
  edict_decision_origins_calamitous_birth:99 "Decision Origins: Calamitous Birth"
  edict_decision_origins_calamitous_birth_desc:99 "Gives the capital planetary feature and the new features on colonization."
  edict_decision_origins_calamitous_birth_tt:99 "Does not give access to the special colony ship, but gives the normal colony ship the asteroid colonization effects."
  
  edict_decision_origins_here_be_dragons:99 "Decision Origins: Here Be Dragons"
  edict_decision_origins_here_be_dragons_desc:99 "Spawns the Sky Dragon and begins the related delayed event chains."
  edict_decision_origins_here_be_dragons_desc_tt:99 "Missing some unique flavor text for first contact."
  
  edict_decision_origins_cosmic_dawn:99 "Decision Origins: Cosmic Dawn"
  edict_decision_origins_cosmic_dawn_desc:99 "Begins the special project, Deep Excavation situation, and Interstellar Refugia quest chain."
  edict_decision_origins_cosmic_dawn_desc_tt:99 "Flavor text may not make much sense if you aren't infernal. Restrictions on this decision origin are intentionally relaxed."
  
  edict_decision_origins_star_slingshot:99 "Decision Origins: Slingshot to the Stars"
  edict_decision_origins_star_slingshot_desc:99 "Spawns the catapult and archaelogy site in an adjacent system, and gives the ability to fix it + research the Quantum Catapult tech."
  edict_decision_origins_star_slingshot_desc_tt:99 "For compatibility purposes, acts as if the Quantum Catapult Insight astral action was used."
  
  edict_decision_origins_necrophage:99 "Decision Origins: Necrophage"
  edict_decision_origins_necrophage_desc:99 "Gives the main species §YNecrophage§! trait.\nKills 2400 pops (1200 if hive), spawns that amount of prepatent pops.\nUnlocks necrophage related species rights and sets game rules.\nChanges guaranteed habitables to have primitives.\nGrants §YChamber of Elevation§! building to the capital."
  edict_decision_origins_necrophage_desc_tt:99 "§KTHIS IS VERY SENSITIVE ORIGIN THAT DOES A LOT OF OVERRIDES, OTHER MODS MAY CONFLICT§!\n\n§RIF YOU WANT TO USE THE PURGE, MAKE SURE THAT YOU CAN PURGE BEFORE TAKING THIS, THOSE POLICIES ARE A MESS TO OVERRIDE / CHECK AND SO IT FALLS TO YOU TO BE SMART ABOUT MAKING YOUR EMPIRE WHEN YOU TAKE THIS§!\n\nDoes not exclude illegal civic combos, BE CAREFUL.\n§HIF YOUR PREPATENT SPECIES DOES NOT GROW, CHECK THEIR POPULATION CONTROL SETTINGS§!\nDoes not include the tradition swap.\nDoes not include necrophage themed event choices, like eating envoys.\nDoes not include modifying tech weights.\nDoes not give the warning event for the initial pop conversion.\n\n$decision_origins_cache_warning$"